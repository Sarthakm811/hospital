<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Smart Hospital Login</title>

    <style>

      body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(
        135deg,
        #eef4ff,
        #f8fbff,
        #eaf2ff
    );

    font-family:'Segoe UI',sans-serif;
}

.login-card{

    width:450px;

    background:white;

    padding:40px;

    border-radius:25px;

    box-shadow:
        0 15px 40px rgba(0,0,0,0.12);

    color:#1e293b;
}

.login-card h1{

    font-size:42px;

    margin-bottom:10px;

    color:#0f172a;
}

.subtitle{

    color:#64748b;

    margin-bottom:30px;
}

.role-buttons{

    display:flex;
    gap:10px;
    margin-bottom:25px;
}

.role-buttons button{

    flex:1;

    padding:14px;

    background:white;

    border:2px solid #cbd5e1;

    border-radius:12px;

    color:#334155;

    cursor:pointer;

    transition:.3s;
}

.role-buttons button:hover{

    border-color:#0ea5e9;

    color:#0ea5e9;
}

input{

    width:100%;

    padding:16px;

    margin-top:15px;

    border:2px solid #dbe4f0;

    border-radius:14px;

    background:white;

    color:#0f172a;

    font-size:15px;

    outline:none;
}

input:focus{

    border-color:#0ea5e9;

    box-shadow:
        0 0 12px rgba(14,165,233,.15);
}

.login-btn{

    width:100%;

    margin-top:25px;

    padding:16px;

    border:none;

    border-radius:14px;

    background:#0ea5e9;

    color:white;

    font-size:18px;

    font-weight:600;

    cursor:pointer;

    transition:.3s;
}

.login-btn:hover{

    background:#0284c7;
}

.register-link{

    text-align:center;

    margin-top:25px;

    color:#64748b;
}

.register-link a{

    color:#0284c7;

    text-decoration:none;

    font-weight:600;
}

    </style>

</head>

<body>

<div class="login-card">

    <h1>Welcome Back</h1>

    <p class="subtitle">

        Login to continue your healthcare journey

    </p>

    <div class="role-buttons">

        <button>Patient</button>

        <button>Doctor</button>

        <button>Admin</button>

    </div>

    <input
            type="email"
            id="email"
            placeholder="Enter Email">

    <input
            type="password"
            id="password"
            placeholder="Enter Password">
            <div class="forgot-link">

    <a href="forgot-password.html"
   style="display:block;
          margin-top:10px;
          color:#0284c7;
          text-decoration:none;">
    Forgot Password?
</a>

</div>

    <button
            class="login-btn"
            onclick="login()">

        Sign In

    </button>

    <div class="register-link">

        Don't have an account?

        <a href="register.html">

            Register Here

        </a>

    </div>

</div>

<script src="js/login.js"></script>

</body>

</html>
