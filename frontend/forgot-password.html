<!DOCTYPE html>
<html>

<head>

    <title>Forgot Password</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f4f8fc;
            padding:20px;
        }

        .card{

            width:380px;

            background:white;

            padding:30px;

            border-radius:24px;

            box-shadow:
            0 8px 30px rgba(0,0,0,0.08);

            border:1px solid #e2e8f0;
        }

        .logo{

            text-align:center;
            margin-bottom:20px;
        }

        .logo h1{

            color:#0ea5e9;
            font-size:32px;
            margin-bottom:5px;
        }

        .logo p{

            color:#64748b;
            font-size:14px;
        }

        h2{

            text-align:center;
            margin-bottom:8px;
            color:#1e293b;
        }

        .subtitle{

            text-align:center;
            color:#64748b;
            margin-bottom:25px;
            font-size:14px;
        }

        .input-group{
            margin-bottom:15px;
        }

        .input-group label{

            display:block;
            margin-bottom:6px;
            color:#334155;
            font-size:14px;
            font-weight:600;
        }

        input{

            width:100%;
            padding:14px;

            border:2px solid #dbeafe;
            border-radius:12px;

            font-size:15px;

            outline:none;

            transition:.3s;
        }

        input:focus{

            border-color:#0ea5e9;
            box-shadow:0 0 10px rgba(14,165,233,.2);
        }

        .btn{

            width:100%;
            padding:14px;

            border:none;

            border-radius:12px;

            background:#0ea5e9;

            color:white;

            font-size:15px;
            font-weight:600;

            cursor:pointer;

            transition:.3s;
        }

        .btn:hover{

            background:#0284c7;
        }

        .btn-secondary{

            margin-top:12px;
        }

        .back{

            text-align:center;
            margin-top:20px;
        }

        .back a{

            color:#0ea5e9;
            text-decoration:none;
            font-weight:600;
        }

        .back a:hover{

            text-decoration:underline;
        }

    </style>

</head>

<body>

<div class="card">

    <div class="logo">

        <h1>MediCare+</h1>

        <p>Smart Hospital Management System</p>

    </div>

    <h2>Forgot Password</h2>

    <p class="subtitle">
        Enter your registered email and verify OTP
    </p>

    <div class="input-group">

        <label>Email Address</label>

        <input
                type="email"
                id="email"
                placeholder="Enter Email">
    </div>

    <button
            class="btn"
            onclick="sendOtp()">

        Send OTP

    </button>

    <div class="input-group" style="margin-top:18px;">

        <label>OTP</label>

        <input
                type="text"
                id="otp"
                placeholder="Enter OTP">

    </div>

    <div class="input-group">

        <label>New Password</label>

        <input
                type="password"
                id="newPassword"
                placeholder="Enter New Password">

    </div>

    <button
            class="btn btn-secondary"
            onclick="resetPassword()">

        Reset Password

    </button>

    <div class="back">

        <a href="login.html">
            Back to Login
        </a>

    </div>

</div>

<script src="js/forgot-password.js"></script>

</body>
</html>
