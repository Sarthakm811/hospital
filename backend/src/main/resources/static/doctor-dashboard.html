<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">

    <title>Doctor Dashboard</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            background:#f4f8fc;
            color:#1e293b;
        }

        .layout{
            display:flex;
        }

        .sidebar{

            width:260px;
            height:100vh;

            position:fixed;
            left:0;
            top:0;

            background:white;

            border-right:1px solid #e2e8f0;

            padding:25px;

            box-shadow:0 0 20px rgba(0,0,0,0.05);
        }

        .sidebar h1{

            color:#0ea5e9;

            margin-bottom:40px;

            text-align:center;
        }

        .sidebar button{

            width:100%;

            padding:15px;

            margin-top:15px;

            border:none;

            border-radius:12px;

            background:#f1f5f9;

            color:#334155;

            text-align:left;

            cursor:pointer;

            transition:.3s;
        }

        .sidebar button:hover{

            background:#0ea5e9;

            color:white;
        }

        .main{

            margin-left:260px;

            width:100%;

            padding:35px;
        }

        .hero{

            background:white;

            padding:35px;

            border-radius:20px;

            box-shadow:0 4px 20px rgba(0,0,0,.08);

            margin-bottom:25px;
        }

        .hero h2{

            font-size:42px;

            margin-bottom:10px;
        }

        .hero p{

            color:#64748b;
        }

        .stats{

            display:flex;

            gap:20px;

            margin-bottom:25px;
        }

        .stat-card{

            flex:1;

            background:white;

            padding:25px;

            border-radius:18px;

            box-shadow:0 4px 20px rgba(0,0,0,.08);

            text-align:center;
        }

        .stat-card h3{

            color:#64748b;

            margin-bottom:10px;
        }

        .stat-card span{

            font-size:36px;

            font-weight:bold;

            color:#0ea5e9;
        }

        .section{
            display:none;
        }

        .active{
            display:block;
        }

        .box{

            background:white;

            padding:30px;

            border-radius:20px;

            box-shadow:0 4px 20px rgba(0,0,0,.08);
        }

        .box h1{

            margin-bottom:20px;
        }

        input{

            width:400px;

            padding:14px;

            border:2px solid #dbeafe;

            border-radius:12px;

            outline:none;

            font-size:15px;
        }

        input:focus{

            border-color:#0ea5e9;
        }

        button.action-btn{

            padding:14px 24px;

            margin-top:18px;

            border:none;

            border-radius:12px;

            background:#0ea5e9;

            color:white;

            cursor:pointer;

            font-weight:600;
        }

        button.action-btn:hover{

            background:#0284c7;
        }

        .card{

            background:white;

            border-left:6px solid #0ea5e9;

            padding:20px;

            border-radius:16px;

            margin-top:15px;

            box-shadow:0 4px 12px rgba(0,0,0,.08);
        }

        .card h3{

            margin-bottom:10px;
        }

        .card p{

            margin-top:5px;

            color:#475569;
        }

    </style>

</head>

<body>

<div class="layout">

    <div class="sidebar">

        <h1>Smart health System</h1>

        <button onclick="showSection('availabilitySection')">
            🩺 Update Availability
        </button>

        <button onclick="showSection('appointmentSection')">
            📅 My Appointments
        </button>

        <button onclick="logout()">
            🚪 Logout
        </button>

    </div>

    <div class="main">

        <div class="hero">

            <h2>Doctor Dashboard</h2>

            <p>
                Manage appointments, schedules and patient consultations.
            </p>

        </div>

        <div class="stats">

            <div class="stat-card">
    <h3>Today's Appointments</h3>
    <span id="todayCount">0</span>
</div>

<div class="stat-card">
    <h3>Pending</h3>
    <span id="pendingCount">0</span>
</div>

<div class="stat-card">
    <h3>Completed</h3>
    <span id="completedCount">0</span>
</div>

        </div>

        <!-- Availability -->

        <div id="availabilitySection" class="section active">

            <div class="box">

                <h1>Update Availability</h1>

                <input
                        type="text"
                        id="availability"
                        placeholder="Example: 10AM - 2PM">

                <br>

                <button
                        class="action-btn"
                        onclick="updateAvailability()">

                    Update Availability

                </button>

            </div>

        </div>

        <!-- Appointments -->

        <div id="appointmentSection" class="section">

            <div class="box">

                <h1>My Appointments</h1>

                <button
                        class="action-btn"
                        onclick="loadDoctorAppointments()">

                    Load Appointments

                </button>

                <div id="appointments"></div>

            </div>

        </div>

    </div>

</div>
<script src="js/doctor.js"></script>

<script>

function showSection(sectionId){

    const sections =
        document.querySelectorAll(".section");

    sections.forEach(section => {

        section.classList.remove("active");

    });

    document
        .getElementById(sectionId)
        .classList.add("active");
}

function logout(){

    localStorage.clear();

    window.location.href = "login.html";
}

window.onload = function(){

    loadDoctorAppointments();

};

</script>

</body>

</html>
